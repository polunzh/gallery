<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>减肥挑战 - 实时赌注追踪</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone {
            width: 375px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 32px 20px;
            box-shadow: 0 32px 64px -16px rgba(0,0,0,0.4),
                        0 0 0 1px rgba(255,255,255,0.1) inset;
            backdrop-filter: blur(20px);
        }

        /* Header */
        .header-title {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 16px;
            text-align: center;
        }

        /* Challenge Banner */
        .challenge-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }

        .challenge-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .trophy {
            font-size: 24px;
        }

        .challenge-text {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .goal-badge {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }

        /* Section Title */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #e2e8f0;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #dc2626;
            background: #fef2f2;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Flow Section - 两侧人物 */
        .flow-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
        }

        .person {
            text-align: center;
            z-index: 2;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 8px;
            position: relative;
        }

        .avatar.lun {
            background: #fef3c7;
            border: 3px solid #f59e0b;
        }

        .avatar.xiao {
            background: #d1fae5;
            border: 3px solid #10b981;
        }

        .person-name {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }

        /* 流动线 */
        .flow-line-container {
            flex: 1;
            height: 60px;
            margin: 0 12px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .flow-line-bg {
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
        }

        .flow-line-progress {
            position: absolute;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #f59e0b, #10b981);
            border-radius: 2px;
            transition: width 0.1s linear;
            overflow: hidden;
        }

        .flow-line-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shimmer 1s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes flash {
            from { opacity: 0.7; }
            to { opacity: 1; }
        }

        /* 流动的钱 - 增强流逝感 */
        .flow-particles {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            top: 50%;
            margin-top: -12px;
            font-size: 22px;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
            animation: flowRight 3s linear infinite;
            opacity: 0;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes flowRight {
            0% {
                left: 0%;
                opacity: 0;
                transform: scale(0.6);
            }
            5% {
                opacity: 1;
                transform: scale(1.1);
            }
            15% {
                transform: scale(1);
            }
            85% {
                opacity: 1;
            }
            95% {
                transform: scale(0.9);
            }
            100% {
                left: 100%;
                opacity: 0;
                transform: scale(0.6);
            }
        }

        /* Cards - 主卡片更突出 */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            padding: 24px 20px;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
        }

        .card.primary {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #f59e0b;
        }

        .card.primary::before {
            background: #f59e0b;
        }

        .card.secondary {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 2px solid #10b981;
        }

        .card.secondary::before {
            background: #10b981;
        }

        .card-label {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 8px;
        }

        .card-amount {
            font-size: 36px;
            font-weight: 900;
            color: #1e293b;
            font-variant-numeric: tabular-nums;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.02em;
        }

        .card-amount .decimal {
            font-size: 24px;
            color: #94a3b8;
            font-weight: 500;
        }

        .card-amount.precise {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover .card-amount.precise {
            opacity: 1;
        }

        .flowing-number {
            font-size: 14px;
            color: #dc2626;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .card-sub {
            font-size: 13px;
            color: #059669;
            font-weight: 500;
        }

        /* Progress Ring - 更简洁 */
        .ring-section {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .ring-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .ring-container svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: #e2e8f0;
            stroke-width: 8;
        }

        .ring-progress {
            fill: none;
            stroke: url(#ringGradient);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        .ring-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .ring-value {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            font-variant-numeric: tabular-nums;
            font-family: 'JetBrains Mono', monospace;
        }

        .ring-label {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }

        /* Stats - 更紧凑 */
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

        .stat-block {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: #64748b;
        }

        .stat-divider {
            width: 1px;
            background: #e2e8f0;
        }

        /* Story Context */
        .story-context {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 12px;
            border-left: 4px solid #f59e0b;
        }

        .story-title {
            font-size: 13px;
            font-weight: 700;
            color: #92400e;
            margin-bottom: 8px;
        }

        .story-text {
            font-size: 12px;
            color: #78350f;
            line-height: 1.6;
        }

        .story-highlight {
            font-weight: 700;
            color: #92400e;
        }
    </style>
</head>
<body>
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f59e0b"/>
                <stop offset="100%" stop-color="#10b981"/>
            </linearGradient>
        </defs>
    </svg>

    <div class="phone">
        <!-- Header -->
        <div class="header-title">挑战追踪</div>

        <!-- Challenge Banner -->
        <div class="challenge-banner">
            <div class="challenge-left">
                <span class="trophy">🏆</span>
                <span class="challenge-text">30天减重挑战</span>
            </div>
            <div class="goal-badge">目标: 50kg</div>
        </div>

        <!-- Section Header -->
        <div class="section-header">
            <div class="section-title">资金监控</div>
            <div class="live-badge">
                <span class="live-dot"></span>
                <span>实时</span>
            </div>
        </div>

        <!-- Flow Section - 仑 to Xiao.诗 -->
        <div class="flow-section">
            <div class="person">
                <div class="avatar lun">🛞</div>
                <div class="person-name">仑</div>
            </div>

            <div class="flow-line-container">
                <div class="flow-line-bg"></div>
                <div class="flow-line-progress" id="flow-progress" style="width: 0%"></div>
                <div class="flow-particles">
                    <div class="particle" style="animation-delay: 0s">💰</div>
                    <div class="particle" style="animation-delay: 0.5s">💵</div>
                    <div class="particle" style="animation-delay: 1s">💰</div>
                    <div class="particle" style="animation-delay: 1.5s">💵</div>
                    <div class="particle" style="animation-delay: 2s">💰</div>
                    <div class="particle" style="animation-delay: 2.5s">💵</div>
                </div>
            </div>

            <div class="person">
                <div class="avatar xiao">👱‍♀️</div>
                <div class="person-name">Xiao.诗</div>
            </div>
        </div>

        <!-- Cards -->
        <div class="cards">
            <div class="card primary">
                <div class="card-label">💰 仑的赌注余额</div>
                <div class="card-amount">
                    ¥<span id="balance-int">1,024</span><span class="decimal">.<span id="balance-dec">00</span></span>
                </div>
                <div class="card-amount precise" id="balance-precise">¥1,024.000000</div>
                <div class="flowing-number">已流失 <span id="burning">¥0.00</span></div>
            </div>
            <div class="card secondary">
                <div class="card-label">🏆 Xiao.诗的目标奖金</div>
                <div class="card-amount" style="color: #059669;">
                    ¥<span id="xiao-int">0</span><span class="decimal">.<span id="xiao-dec">00</span></span>
                </div>
                <div class="card-amount precise" id="xiao-precise" style="color: #059669;">¥0.000000</div>
                <div class="card-sub">减到50kg即可全额获得</div>
            </div>
        </div>

        <!-- Progress Ring -->
        <div class="ring-section">
            <div class="ring-container">
                <svg width="140" height="140" viewBox="0 0 140 140">
                    <circle class="ring-bg" cx="70" cy="70" r="60"/>
                    <circle class="ring-progress" id="ring" cx="70" cy="70" r="60"
                            stroke-dasharray="376.99" stroke-dashoffset="376.99"/>
                </svg>
                <div class="ring-inner">
                    <div class="ring-value" id="percent">0%</div>
                    <div class="ring-label">已转移</div>
                </div>
            </div>
        </div>

        <!-- Progress Ring -->
        <div class="ring-section">
            <div class="ring-container">
                <svg width="120" height="120" viewBox="0 0 120 120">
                    <circle class="ring-bg" cx="60" cy="60" r="52"/>
                    <circle class="ring-progress" id="ring" cx="60" cy="60" r="52"
                            stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
                </svg>
                <div class="ring-inner">
                    <div class="ring-value" id="percent">0%</div>
                    <div class="ring-label">资金已转移</div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-block">
                <div class="stat-value" id="days">--</div>
                <div class="stat-label">天剩余</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-block">
                <div class="stat-value" id="rate">¥0.00</div>
                <div class="stat-label">每秒流失</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-block">
                <div class="stat-value">5/8</div>
                <div class="stat-label">截止日</div>
            </div>
        </div>

        <!-- Story Context -->
        <div class="story-context">
            <div class="story-title">🏋️ 挑战规则</div>
            <div class="story-text">
                Xiao.诗需要在 <span class="story-highlight">2026年5月8日早8点</span> 前减重至 <span class="story-highlight">50kg</span>。
                每过一秒，仑的¥1024赌注就流逝一部分到Xiao.诗的奖金池。
                如果目标达成，Xiao.诗获得全部奖金；如果失败，剩余金额归还仑。
            </div>
        </div>
    </div>

    <script>
        // 固定时间段: 2026-04-08 00:00:00 - 2026-05-08 08:00:00
        const START_DATE = new Date('2026-04-08T00:00:00+08:00');
        const END_DATE = new Date('2026-05-08T08:00:00+08:00');
        const TOTAL_AMOUNT = 1024;

        const TOTAL_DURATION = END_DATE - START_DATE;
        const RATE = TOTAL_AMOUNT / (TOTAL_DURATION / 1000);

        function formatMoney(amount) {
            const intPart = Math.floor(amount);
            const decPart = Math.floor((amount % 1) * 100);
            return {
                int: intPart.toLocaleString(),
                dec: decPart.toString().padStart(2, '0'),
                full: '¥' + amount.toFixed(6)
            };
        }

        function update() {
            const now = Date.now();

            // 计算进度（基于固定时间段）
            let elapsed = now - START_DATE;
            let progress = elapsed / TOTAL_DURATION;

            // 限制在 0-1 范围内
            if (progress < 0) {
                progress = 0;
                elapsed = 0;
            } else if (progress > 1) {
                progress = 1;
                elapsed = TOTAL_DURATION;
            }

            const remaining = Math.max(0, END_DATE - now);
            const currentAmount = Math.max(0, TOTAL_AMOUNT - RATE * (elapsed / 1000));
            const transferred = TOTAL_AMOUNT - currentAmount;

            // 更新仑的余额 - 主显示2位小数，精确值6位
            const balanceFormatted = formatMoney(currentAmount);
            document.getElementById('balance-int').textContent = balanceFormatted.int;
            document.getElementById('balance-dec').textContent = balanceFormatted.dec;
            document.getElementById('balance-precise').textContent = balanceFormatted.full;

            // 更新Xiao.诗的奖金
            const xiaoFormatted = formatMoney(transferred);
            document.getElementById('xiao-int').textContent = xiaoFormatted.int;
            document.getElementById('xiao-dec').textContent = xiaoFormatted.dec;
            document.getElementById('xiao-precise').textContent = xiaoFormatted.full;

            // 更新已流失金额
            document.getElementById('burning').textContent = '¥' + transferred.toFixed(2);

            // 更新流动线进度
            document.getElementById('flow-progress').style.width = (progress * 100) + '%';

            // 更新圆环进度（已转移）
            const circumference = 326.73;
            document.getElementById('ring').style.strokeDashoffset = circumference - (progress * circumference);
            document.getElementById('percent').textContent = Math.floor(progress * 100) + '%';

            // 更新剩余天数 - 显示1位小数
            document.getElementById('days').textContent = (remaining / 86400000).toFixed(1);

            // 更新每秒流失
            document.getElementById('rate').textContent = '¥' + RATE.toFixed(4);

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
