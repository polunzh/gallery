<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50kg or ¥0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            /* 主色调 */
            --color-primary: #e11d48;
            --color-primary-dark: #be123c;
            --color-primary-light: #fecdd3;

            /* 功能色 */
            --color-success: #10b981;
            --color-success-light: #d1fae5;
            --color-warning: #f59e0b;
            --color-warning-light: #fef3c7;

            /* 中性色 */
            --color-bg-dark: #1a1a2e;
            --color-bg-mid: #16213e;
            --color-bg-light: #f8fafc;
            --color-surface: rgba(255, 255, 255, 0.95);

            /* 文字色 */
            --color-text-primary: #1e293b;
            --color-text-secondary: #64748b;
            --color-text-muted: #94a3b8;
            --color-text-inverse: #ffffff;

            /* 边框 */
            --color-border: #e2e8f0;
            --color-border-light: #f1f5f9;

            /* 阴影 */
            --shadow-card: 0 32px 64px -16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
            --shadow-banner: 0 4px 12px rgba(225, 29, 72, 0.3);

            /* 间距 */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* 圆角 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;

            /* 字体 */
            --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            /* 动画 */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 焦点指示器 */
        *:focus-visible {
            outline: 3px solid var(--color-primary);
            outline-offset: 2px;
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, var(--color-bg-dark) 0%, var(--color-bg-mid) 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone {
            width: min(100%, 400px);
            max-width: 100%;
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            padding: var(--space-xl) clamp(16px, 5vw, 24px);
            box-shadow: var(--shadow-card);
            margin: 0 auto;
        }

        /* Header */
        .header-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-md);
            text-align: center;
        }

        /* Challenge Banner */
        .challenge-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            margin-bottom: var(--space-lg);
            box-shadow: var(--shadow-banner);
        }

        .challenge-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .trophy {
            font-size: 24px;
        }

        .challenge-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-inverse);
        }

        .goal-badge {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }

        /* Section Title */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--color-border);
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-primary);
            background: var(--color-primary-light);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 无障碍：尊重用户动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Flow Section - 两侧人物 */
        .flow-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
        }

        .person {
            text-align: center;
            z-index: 2;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 8px;
            position: relative;
        }

        .avatar.lun {
            background: var(--color-warning-light);
            border: 3px solid var(--color-warning);
        }

        .avatar.xiao {
            background: var(--color-success-light);
            border: 3px solid var(--color-success);
        }

        .person-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        /* 流动线 */
        .flow-line-container {
            flex: 1;
            height: 60px;
            margin: 0 12px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .flow-line-bg {
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--color-border);
            border-radius: 2px;
        }

        .flow-line-progress {
            position: absolute;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-warning), var(--color-success));
            border-radius: 2px;
            transition: width 0.1s linear;
            overflow: hidden;
        }

        .flow-line-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shimmer 1s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes flash {
            from { opacity: 0.7; }
            to { opacity: 1; }
        }

        /* 流动的钱 - 增强流逝感 */
        .flow-particles {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            top: 50%;
            margin-top: -12px;
            font-size: 22px;
            line-height: 1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
            animation: flowRight 3s linear infinite;
            opacity: 0;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes flowRight {
            0% {
                transform: translateX(-100%) scale(0.6);
                opacity: 0;
            }
            5% {
                opacity: 1;
                transform: translateX(-95%) scale(1.1);
            }
            15% {
                transform: translateX(-85%) scale(1);
            }
            85% {
                opacity: 1;
                transform: translateX(85%) scale(1);
            }
            95% {
                transform: translateX(95%) scale(0.9);
            }
            100% {
                transform: translateX(100%) scale(0.6);
                opacity: 0;
            }
        }

        /* Cards - 主卡片更突出 */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: var(--space-lg);
        }

        .card {
            background: linear-gradient(135deg, var(--color-bg-light) 0%, var(--color-border-light) 100%);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            border: 1px solid var(--color-border);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-warning), var(--color-primary));
        }

        .card.primary {
            background: linear-gradient(135deg, var(--color-warning-light) 0%, #fde68a 100%);
            border: 2px solid var(--color-warning);
        }

        .card.primary::before {
            background: var(--color-warning);
        }

        .card.secondary {
            background: linear-gradient(135deg, var(--color-success-light) 0%, #a7f3d0 100%);
            border: 2px solid var(--color-success);
        }

        .card.secondary::before {
            background: var(--color-success);
        }

        .card-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-sm);
        }

        .card-amount {
            font-size: 36px;
            font-weight: 900;
            color: var(--color-text-primary);
            font-variant-numeric: tabular-nums;
            margin-bottom: var(--space-sm);
            font-family: var(--font-mono);
            letter-spacing: -0.02em;
        }

        .card-amount .decimal {
            font-size: 24px;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .card-amount.precise {
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 500;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .card:hover .card-amount.precise {
            opacity: 1;
        }

        .flowing-number {
            font-size: 14px;
            color: var(--color-primary);
            font-family: var(--font-mono);
            font-weight: 500;
        }

        .card-sub {
            font-size: 13px;
            color: var(--color-success);
            font-weight: 500;
        }

        /* Progress Ring - 更简洁 */
        .ring-section {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .ring-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .ring-container svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: #e2e8f0;
            stroke-width: 8;
        }

        .ring-progress {
            fill: none;
            stroke: url(#ringGradient);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        .ring-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .ring-value {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            font-variant-numeric: tabular-nums;
            font-family: 'JetBrains Mono', monospace;
        }

        .ring-label {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }

        /* Stats - 更紧凑 */
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

        .stat-block {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: #64748b;
        }

        .stat-divider {
            width: 1px;
            background: #e2e8f0;
        }

        /* Story Context */
        .story-context {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 12px;
            border-left: 4px solid #f59e0b;
        }

        .story-title {
            font-size: 13px;
            font-weight: 700;
            color: #92400e;
            margin-bottom: 8px;
        }

        .story-text {
            font-size: 12px;
            color: #78350f;
            line-height: 1.6;
        }

        .story-highlight {
            font-weight: 700;
            color: #92400e;
        }
    </style>
</head>
<body>
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f59e0b"/>
                <stop offset="100%" stop-color="#10b981"/>
            </linearGradient>
        </defs>
    </svg>

    <main class="phone" role="main" aria-label="减肥挑战赌注追踪">
        <!-- Header -->
        <header>
            <h1 class="header-title">挑战追踪</h1>
        </header>

        <!-- Challenge Banner -->
        <section class="challenge-banner" aria-label="挑战目标">
            <div class="challenge-left">
                <span class="trophy">🏆</span>
                <span class="challenge-text">30天减重挑战</span>
            </div>
            <div class="goal-badge">目标: 50kg</div>
        </section>

        <!-- Section Header -->
        <section class="section-header" aria-label="资金监控状态">
            <div class="section-title">资金监控</div>
            <div class="live-badge">
                <span class="live-dot"></span>
                <span>实时</span>
            </div>
        </section>

        <!-- Flow Section - 仑 to Xiao.诗 -->
        <section class="flow-section" aria-label="资金流向">
            <div class="person">
                <div class="avatar lun">🛞</div>
                <div class="person-name">仑</div>
            </div>

            <div class="flow-line-container">
                <div class="flow-line-bg"></div>
                <div class="flow-line-progress" id="flow-progress" style="width: 0%"></div>
                <div class="flow-particles">
                    <div class="particle" style="animation-delay: 0s">💰</div>
                    <div class="particle" style="animation-delay: 0.5s">💵</div>
                    <div class="particle" style="animation-delay: 1s">💰</div>
                    <div class="particle" style="animation-delay: 1.5s">💵</div>
                    <div class="particle" style="animation-delay: 2s">💰</div>
                    <div class="particle" style="animation-delay: 2.5s">💵</div>
                </div>
            </div>

            <div class="person">
                <div class="avatar xiao">👱‍♀️</div>
                <div class="person-name">Xiao.诗</div>
            </div>
        </section>

        <!-- Cards -->
        <section class="cards" aria-label="金额统计">
            <div class="card primary">
                <div class="card-label">💰 仑的赌注余额</div>
                <div class="card-amount">
                    ¥<span id="balance-int">1,024</span><span class="decimal">.<span id="balance-dec">00</span></span>
                </div>
                <div class="card-amount precise" id="balance-precise">¥1,024.000000</div>
                <div class="flowing-number">已流失 <span id="burning">¥0.00</span></div>
            </div>
            <div class="card secondary">
                <div class="card-label">🏆 Xiao.诗的目标奖金</div>
                <div class="card-amount" style="color: #059669;">
                    ¥<span id="xiao-int">0</span><span class="decimal">.<span id="xiao-dec">00</span></span>
                </div>
                <div class="card-amount precise" id="xiao-precise" style="color: #059669;">¥0.000000</div>
                <div class="card-sub">减到50kg即可全额获得</div>
            </div>
        </section>

        <!-- Progress Ring -->
        <section class="ring-section" aria-label="进度指示">
            <div class="ring-container">
                <svg width="120" height="120" viewBox="0 0 120 120">
                    <circle class="ring-bg" cx="60" cy="60" r="52"/>
                    <circle class="ring-progress" id="ring" cx="60" cy="60" r="52"
                            stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
                </svg>
                <div class="ring-inner">
                    <div class="ring-value" id="percent">0%</div>
                    <div class="ring-label">资金已转移</div>
                </div>
            </div>
        </section>

        <!-- Stats -->
        <section class="stats" aria-label="统计数据">
            <div class="stat-block">
                <div class="stat-value" id="days">--</div>
                <div class="stat-label">天剩余</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-block">
                <div class="stat-value" id="rate">¥0.00</div>
                <div class="stat-label">每秒流失</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-block">
                <div class="stat-value">5/8</div>
                <div class="stat-label">截止日</div>
            </div>
        </section>

        <!-- Story Context -->
        <section class="story-context" aria-label="挑战规则说明">
            <h2 class="story-title">🏋️ 挑战规则</h2>
            <p class="story-text">
                Xiao.诗需要在 <span class="story-highlight">2026年5月8日早8点</span> 前减重至 <span class="story-highlight">50kg</span>。
                每过一秒，仑的¥1024赌注就流逝一部分到Xiao.诗的奖金池。
                如果目标达成，Xiao.诗获得全部奖金；如果失败，剩余金额归还仑。
            </p>
        </section>
    </main>

    <script>
        // 固定时间段: 2026-04-08 00:00:00 - 2026-05-08 08:00:00
        const START_DATE = new Date('2026-04-08T00:00:00+08:00');
        const END_DATE = new Date('2026-05-08T08:00:00+08:00');
        const TOTAL_AMOUNT = 1024;

        const TOTAL_DURATION = END_DATE - START_DATE;
        const RATE = TOTAL_AMOUNT / (TOTAL_DURATION / 1000);

        // 缓存DOM引用
        const dom = {
            balanceInt: document.getElementById('balance-int'),
            balanceDec: document.getElementById('balance-dec'),
            balancePrecise: document.getElementById('balance-precise'),
            xiaoInt: document.getElementById('xiao-int'),
            xiaoDec: document.getElementById('xiao-dec'),
            xiaoPrecise: document.getElementById('xiao-precise'),
            burning: document.getElementById('burning'),
            flowProgress: document.getElementById('flow-progress'),
            ring: document.getElementById('ring'),
            percent: document.getElementById('percent'),
            days: document.getElementById('days'),
            rate: document.getElementById('rate')
        };

        const RING_CIRCUMFERENCE = 326.73;
        let lastUpdate = 0;

        function formatMoney(amount) {
            const intPart = Math.floor(amount);
            const decPart = Math.floor((amount % 1) * 100);
            return {
                int: intPart.toLocaleString(),
                dec: decPart.toString().padStart(2, '0'),
                full: '¥' + amount.toFixed(6)
            };
        }

        function update() {
            const now = Date.now();

            // 节流：每100ms更新一次（约10fps，足够看到数字变化）
            if (now - lastUpdate < 100) {
                requestAnimationFrame(update);
                return;
            }
            lastUpdate = now;

            // 计算进度（基于固定时间段）
            let elapsed = now - START_DATE;
            let progress = elapsed / TOTAL_DURATION;

            // 限制在 0-1 范围内
            if (progress < 0) {
                progress = 0;
                elapsed = 0;
            } else if (progress > 1) {
                progress = 1;
                elapsed = TOTAL_DURATION;
            }

            const remaining = Math.max(0, END_DATE - now);
            const currentAmount = Math.max(0, TOTAL_AMOUNT - RATE * (elapsed / 1000));
            const transferred = TOTAL_AMOUNT - currentAmount;

            // 更新仑的余额 - 主显示2位小数，精确值6位
            const balanceFormatted = formatMoney(currentAmount);
            dom.balanceInt.textContent = balanceFormatted.int;
            dom.balanceDec.textContent = balanceFormatted.dec;
            dom.balancePrecise.textContent = balanceFormatted.full;

            // 更新Xiao.诗的奖金
            const xiaoFormatted = formatMoney(transferred);
            dom.xiaoInt.textContent = xiaoFormatted.int;
            dom.xiaoDec.textContent = xiaoFormatted.dec;
            dom.xiaoPrecise.textContent = xiaoFormatted.full;

            // 更新已流失金额
            dom.burning.textContent = '¥' + transferred.toFixed(2);

            // 更新流动线进度
            dom.flowProgress.style.width = (progress * 100) + '%';

            // 更新圆环进度（已转移）
            dom.ring.style.strokeDashoffset = RING_CIRCUMFERENCE - (progress * RING_CIRCUMFERENCE);
            dom.percent.textContent = Math.floor(progress * 100) + '%';

            // 更新剩余天数 - 显示1位小数
            dom.days.textContent = (remaining / 86400000).toFixed(1);

            // 更新每秒流失（只需更新一次，因为是常量）
            if (dom.rate.textContent === '¥0.00') {
                dom.rate.textContent = '¥' + RATE.toFixed(4);
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
