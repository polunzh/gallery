<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#100d09"/>
  <!-- Film frame / light ray motif -->
  <rect x="7" y="9" width="18" height="14" rx="2" fill="none" stroke="#d4b896" stroke-width="1.5"/>
  <rect x="10" y="12" width="12" height="8" rx="1" fill="#d4b896" opacity="0.15"/>
  <!-- Light rays from top-left corner -->
  <line x1="8" y1="10" x2="13" y2="15" stroke="#d4b896" stroke-width="1" opacity="0.6"/>
  <line x1="8" y1="13" x2="12" y2="17" stroke="#d4b896" stroke-width="0.8" opacity="0.4"/>
  <line x1="11" y1="10" x2="15" y2="14" stroke="#d4b896" stroke-width="0.8" opacity="0.4"/>
  <!-- Small dot accent -->
  <circle cx="21" cy="14" r="1.5" fill="#d4b896" opacity="0.7"/>
</svg>
