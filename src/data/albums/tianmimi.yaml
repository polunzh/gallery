id: tianmimi
title: 甜蜜蜜
cover: 01-true-meeting.jpg
date: "2025-04"
preface: |
  黎小军和李翘在香港相识。那时他们都只是南下来讨生活的人，白天奔忙，夜里把盼头寄在更远的地方。后来他们相伴、失散、各自漂流，身边的人一个个退场，城市也一站站变换，等再回头，最先走远的反而是当年以为抓得住的东西。

  《甜蜜蜜》写的不只是爱情，更是那一代人的身世：离乡、谋生、上路、失散。许多苦不是一下子落下来的，而是在日子一天一天往前挪的时候，慢慢把人和旧事都留在了身后。
layout:
  # ═══ 楔子：真正的相遇 ═══
  - type: hero
    src: 01-true-meeting.jpg
    caption: 同途
    description: 一九八六年，同一列南下的火车，车厢里飘着同一首歌，他们背对背坐着，还不知道往后的年月会彼此牵连
    original: 真正的相遇.png

  - type: text
    content: 南下的人挤上同一班车，落地以后，却要各自去受各自的苦

  # ═══ 第一幕：香港，一九八六年 ═══
  - type: full
    src: 02-first-meeting.jpg
    caption: 初见
    description: 麦当劳里，她教他粤语，他请她吃饭，两个初到香港的人先学着在陌生地方站稳脚跟
    original: 第一次见面.png

  - type: full
    src: 03-complex-feeling.jpg
    caption: 复杂
    description: 她侧头看他，眼神里有些说不清的情绪，像在异乡忽然认出一点熟悉
    original: 初遇后复杂的心情.png

  - type: pair
    items:
      - src: 04-cantonese.jpg
        caption: 生涩
        description: 他才开口，乡音便先露了出来
        original: 第一次见面-不熟练的粤语.png
      - src: 05-first-chat.jpg
        caption: 俯身
        description: 她弯下身，一字一句地教，他也一句一句地学
        original: 第一次私下交谈.png

  - type: pair
    items:
      - src: 06-aunt-care.jpg
        caption: 落脚处
        description: 姑姑的屋里总有热汤，也给初到香港的人留下一点安稳
        original: 姑姑的照顾.png
      - src: 07-rain-delivery.jpg
        caption: 奔波
        description: 香港的雨说下就下，他披着雨衣穿行街巷，为一日三餐
        original: 初来乍到-雨中用自行车送货.png

  - type: full
    src: 08-english-class.jpg
    caption: 同桌
    description: 窄小的教室里，他们一边学英文，一边把往后的路想得很远
    original: 上英语课.png

  - type: pair
    items:
      - src: 09-study-english.jpg
        caption: 学英文
        description: 小桌前背单词，笨拙却认真
        original: 学习英文.png
      - src: 10-check-balance.jpg
        caption: 生计
        description: 数着存款，算着日子，梦想还很远
        original: 查银行卡余额.png

  - type: text
    content: 那时候，人人都信再往前走一点，苦日子总会有个尽头

  # ═══ 第二幕：甜蜜蜜 ═══
  - type: full
    src: 11-bike-ride.jpg
    caption: 甜蜜蜜
    description: 他骑着车，她在后座轻轻唱，邓丽君的旋律飘过香港街头
    original: 第一次骑自行车.png

  - type: pair
    items:
      - src: 12-singing.jpg
        caption: 在春风里
        description: "你笑得甜蜜蜜，好像花儿开在春风里"
        original: 第一次骑自行车-唱歌.png
      - src: 13-beautiful.jpg
        caption: 一刻
        description: 那时他们都以为，这样的日子还可以再久一点
        original: 美好.png

  - type: full
    src: 14-daily-life.jpg
    caption: 日常
    description: 一起吃馄饨，一起数零钱，苦日子里也有能让人暂时忘了漂泊的时候
    original: 日常相处.png

  - type: pair
    items:
      - src: 15-surprised.jpg
        caption: 失神
        description: 她看着他，一时没有说话，神情像被什么旧事轻轻碰了一下
        original: 吃惊黎小军的单纯.png
      - src: 16-silly-smile.jpg
        caption: 仍旧
        description: 他笑起来还是从前的样子，像这些年的奔忙也没把那点心气磨尽
        original: 傻笑.png

  - type: full
    src: 17-bracelet.jpg
    caption: 旧念
    description: 镯子拿在手里，他忽然想起天津，想起那段始终没真正过去的旧日子
    original: 买金手镯-惊讶黎小军同时想着小婷.png

  - type: text
    content: 人一忙着往前赶，许多话就只能压下去，压着压着，也就真的成了过去

  # ═══ 第三幕：分离 ═══
  - type: full
    src: 18-comfort.jpg
    caption: 陪着
    description: 她以为抓住了上去的梯子，转眼又跌回原处；他还坐在她身边，没有走开
    original: 安慰李翘.png

  - type: full
    src: 19-paoge-dead.jpg
    caption: 诀别
    description: 那个一直护着她的人走了，只剩身上的纹身替这段旧事作证
    original: 爱李翘的豹哥去世了.png

  # ═══ 第四幕：重逢 ═══
  - type: text
    content: 一九九五年，香港街头

  - type: pair
    items:
      - src: 20-reunion1-mixed.jpg
        caption: 五味杂陈
        description: 多年后再见，往事涌上心头，不知从何说起
        original: 第一次重逢-五味杂陈.png
      - src: 21-reunion1-truth.jpg
        caption: 说破
        description: 兜转多年，有些话终于说出口，可年头已经旧了，人也不在原来的地方了
        original: 第一次重逢-直面真心.png

  - type: text
    content: 话终于说明白，人生却早已把他们带去了两边

  - type: full
    src: 22-reunion2-see.jpg
    caption: 一瞥
    description: 纽约街头，一个熟悉的背影骑车掠过去，她几乎立刻就认了出来
    original: 第二次重逢-看见黎小军的背影.png

  - type: pair
    items:
      - src: 23-reunion2-chase.jpg
        caption: 追上去
        description: 她穿过人群追过去，脚步急得像要从喧闹里追回一段已经沉下去的年月
        original: 第二次重逢-追逐骑车的黎小军.png
      - src: 24-reunion2-miss.jpg
        caption: 又错过
        description: 一盏红灯拦在前面，她只能看着那道背影重新没进人海
        original: 第二次重逢-最终没有追上黎小军.png

  # ═══ 第五幕：最终的重逢 ═══
  - type: text
    content: 一九九五年五月八日，纽约

  - type: full
    src: 25-us-life.jpg
    caption: 漂泊
    description: 她在洗衣店打工，他在唐人街落脚，各自在异乡讨生活，把旧人旧事一层层压进日常
    original: 在美国的普通生活.png

  - type: full
    src: 26-teresa-dead.jpg
    caption: 邓丽君
    description: 电视里传来邓丽君去世的消息，他们同时停在橱窗前，像被那些已经散掉的年月绊住了脚步
    original: 最终的重逢-观看邓丽君去世的消息.png

  - type: pair
    items:
      - src: 27-final-recognize-him.jpg
        caption: 回身
        description: 她转过头，一眼就看见了那个熟悉的人
        original: 最终的重逢-认出了黎小军.png
      - src: 28-final-recognize-her.jpg
        caption: 是你
        description: 他也认出了她，隔着这些年，像忽然认出自己也曾这样年轻过
        original: 最终的重逢-黎小军认出了李翘.png

  - type: pair
    items:
      - src: 29-final-smile-her.jpg
        caption: 如旧
        description: 她终于笑了，那一点神情和当年并没有两样
        original: 最终的重逢-李翘开心的笑了.png
      - src: 30-final-smile-him.jpg
        caption: 在梦里
        description: "我一时想不起，啊，在梦里"
        original: 最终的重逢-黎开心的笑了.png

  - type: text
    content: 梦里遇见你，原来不是梦
