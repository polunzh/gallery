id: tianmimi
title: 甜蜜蜜
cover: 01-true-meeting.jpg
date: "2025-04"
layout:
  # ═══ 楔子：真正的相遇 ═══
  - type: hero
    src: 01-true-meeting.jpg
    caption: 命中注定
    description: 一九八六年，开往香港的列车上，他们背对背睡着，尚未相识
    original: 真正的相遇.png

  - type: text
    content: 有些缘分，早在相遇之前就已开始

  # ═══ 第一幕：香港，一九八六年 ═══
  - type: full
    src: 02-first-meeting.jpg
    caption: 初见
    description: 麦当劳里，她教他粤语，他请她吃饭，异乡的第一丝暖意
    original: 第一次见面.png

  - type: full
    src: 03-complex-feeling.jpg
    caption: 复杂
    description: 她侧头看他，眼神里有些说不清的情绪，是异乡遇到的第一个同类
    original: 初遇后复杂的心情.png

  - type: pair
    items:
      - src: 04-cantonese.jpg
        caption: 学粤语
        description: 他刚开口，她就笑了，这口音一听就不是本地人
        original: 第一次见面-不熟练的粤语.png
      - src: 05-first-chat.jpg
        caption: 听得明白
        description: 她弯下腰一字一句教，粤语难学，有人愿意学就不算难
        original: 第一次私下交谈.png

  - type: pair
    items:
      - src: 06-aunt-care.jpg
        caption: 落脚处
        description: 姑姑的屋里永远有热汤，是漂泊的人唯一的依靠
        original: 姑姑的照顾.png
      - src: 07-rain-delivery.jpg
        caption: 奔波
        description: 香港的雨说下就下，他披着雨衣穿行街巷，为一日三餐
        original: 初来乍到-雨中用自行车送货.png

  - type: full
    src: 08-english-class.jpg
    caption: 英语课
    description: 两个人挤在教室里，梦想着未来，笑声很大
    original: 上英语课.png

  - type: pair
    items:
      - src: 09-study-english.jpg
        caption: 学英文
        description: 小桌前背单词，笨拙却认真
        original: 学习英文.png
      - src: 10-check-balance.jpg
        caption: 生计
        description: 数着存款，算着日子，梦想还很远
        original: 查银行卡余额.png

  - type: text
    content: 那时候，我们都以为未来会不一样

  # ═══ 第二幕：甜蜜蜜 ═══
  - type: full
    src: 11-bike-ride.jpg
    caption: 甜蜜蜜
    description: 他骑着车，她在后座轻轻唱，邓丽君的旋律飘过香港街头
    original: 第一次骑自行车.png

  - type: pair
    items:
      - src: 12-singing.jpg
        caption: 在春风里
        description: "你笑得甜蜜蜜，好像花儿开在春风里"
        original: 第一次骑自行车-唱歌.png
      - src: 13-beautiful.jpg
        caption: 美好
        description: 那一刻以为，这样的日子会一直过下去
        original: 美好.png

  - type: full
    src: 14-daily-life.jpg
    caption: 日常
    description: 一起吃馄饨，一起数零钱，平凡的相伴最是难得
    original: 日常相处.png

  - type: pair
    items:
      - src: 15-surprised.jpg
        caption: 惊讶
        description: 她看着他，像是在看一个从旧时光走出来的人
        original: 吃惊黎小军的单纯.png
      - src: 16-silly-smile.jpg
        caption: 傻笑
        description: 他还是那样笑着，好像这些年的风雨都没留下痕迹
        original: 傻笑.png

  - type: full
    src: 17-bracelet.jpg
    caption: 金镯子
    description: 她惊讶地发现，他心里还装着天津的小婷
    original: 买金手镯-惊讶黎小军同时想着小婷.png

  - type: text
    content: 命运弄人，我们都没有选对时间

  # ═══ 第三幕：分离 ═══
  - type: full
    src: 18-comfort.jpg
    caption: 陪伴
    description: 她炒股输光了一切，他在身边默默安慰
    original: 安慰李翘.png

  - type: full
    src: 19-paoge-dead.jpg
    caption: 豹哥
    description: 那个爱她的男人走了，老鼠纹身在身上，她却泪流满面
    original: 爱李翘的豹哥去世了.png

  # ═══ 第四幕：重逢 ═══
  - type: text
    content: 一九九五年，香港街头

  - type: pair
    items:
      - src: 20-reunion1-mixed.jpg
        caption: 五味杂陈
        description: 多年后再见，往事涌上心头，不知从何说起
        original: 第一次重逢-五味杂陈.png
      - src: 21-reunion1-truth.jpg
        caption: 真心
        description: 她终于说出那句埋藏多年的话
        original: 第一次重逢-直面真心.png

  - type: text
    content: 可惜造化弄人，终究还是错过

  - type: full
    src: 22-reunion2-see.jpg
    caption: 背影
    description: 纽约街头，她看见一个熟悉的身影骑车经过
    original: 第二次重逢-看见黎小军的背影.png

  - type: pair
    items:
      - src: 23-reunion2-chase.jpg
        caption: 追逐
        description: 她拼命追赶，穿过车水马龙
        original: 第二次重逢-追逐骑车的黎小军.png
      - src: 24-reunion2-miss.jpg
        caption: 错过
        description: 红灯挡住了她，眼睁睁看着那个背影消失
        original: 第二次重逢-最终没有追上黎小军.png

  # ═══ 第五幕：最终的重逢 ═══
  - type: text
    content: 一九九五年五月八日，纽约

  - type: full
    src: 25-us-life.jpg
    caption: 异乡
    description: 她在洗衣店打工，他在唐人街落脚，各自漂泊
    original: 在美国的普通生活.png

  - type: full
    src: 26-teresa-dead.jpg
    caption: 邓丽君
    description: 电视播报邓丽君去世的消息，他们同时驻足在商店橱窗前
    original: 最终的重逢-观看邓丽君去世的消息.png

  - type: pair
    items:
      - src: 27-final-recognize-him.jpg
        caption: 认出
        description: 她转过头，看见了那个熟悉的人
        original: 最终的重逢-认出了黎小军.png
      - src: 28-final-recognize-her.jpg
        caption: 是你
        description: 他也认出了她，岁月在脸上，情意未改
        original: 最终的重逢-黎小军认出了李翘.png

  - type: pair
    items:
      - src: 29-final-smile-her.jpg
        caption: 笑
        description: 她笑了，像当年一样甜
        original: 最终的重逢-李翘开心的笑了.png
      - src: 30-final-smile-him.jpg
        caption: 在梦里
        description: "我一时想不起，啊，在梦里"
        original: 最终的重逢-黎开心的笑了.png

  - type: text
    content: 梦里遇见你，原来不是梦
