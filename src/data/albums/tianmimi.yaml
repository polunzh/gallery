id: tianmimi
title: 甜蜜蜜
cover: 01-true-meeting.jpg
date: "2025-04"
preface: |
  黎小军和李翘在时代洪流中相遇、相识、走散，又在多年后异乡重逢。萍水相逢的人，原来也会在漫长岁月里兜兜转转，最后再一次走到彼此面前。

  就像我们每个人，都在这个世界上飘着，经历离散，也等待重逢。
layout:
  # ═══ 楔子：真正的相遇 ═══
  - type: hero
    src: 01-true-meeting.jpg
    caption: 命中注定
    description: 一九八六年，同一列南下的火车，车厢里飘着同一首歌，他们背对背坐着，还不知道这一程会在很多年后有回音
    original: 真正的相遇.png

  - type: text
    content: 有些缘分，早在相遇之前就已开始

  # ═══ 第一幕：香港，一九八六年 ═══
  - type: full
    src: 02-first-meeting.jpg
    caption: 初见
    description: 麦当劳里，她教他粤语，他请她吃饭，异乡的第一丝暖意
    original: 第一次见面.png

  - type: full
    src: 03-complex-feeling.jpg
    caption: 复杂
    description: 她侧头看他，眼神里有些说不清的情绪，像是在异乡忽然遇见了一个可以听懂自己的人
    original: 初遇后复杂的心情.png

  - type: pair
    items:
      - src: 04-cantonese.jpg
        caption: 生涩
        description: 他才开口，乡音便先露了出来
        original: 第一次见面-不熟练的粤语.png
      - src: 05-first-chat.jpg
        caption: 一字一句
        description: 她弯下身，一字一句地教，他也一句一句地学
        original: 第一次私下交谈.png

  - type: pair
    items:
      - src: 06-aunt-care.jpg
        caption: 落脚处
        description: 姑姑的屋里永远有热汤，是漂泊的人唯一的依靠
        original: 姑姑的照顾.png
      - src: 07-rain-delivery.jpg
        caption: 奔波
        description: 香港的雨说下就下，他披着雨衣穿行街巷，为一日三餐
        original: 初来乍到-雨中用自行车送货.png

  - type: full
    src: 08-english-class.jpg
    caption: 同桌
    description: 窄小的教室里，他们一边学英文，一边把未来说得很近
    original: 上英语课.png

  - type: pair
    items:
      - src: 09-study-english.jpg
        caption: 学英文
        description: 小桌前背单词，笨拙却认真
        original: 学习英文.png
      - src: 10-check-balance.jpg
        caption: 生计
        description: 数着存款，算着日子，梦想还很远
        original: 查银行卡余额.png

  - type: text
    content: 那时候，我们都以为未来会不一样

  # ═══ 第二幕：甜蜜蜜 ═══
  - type: full
    src: 11-bike-ride.jpg
    caption: 甜蜜蜜
    description: 他骑着车，她在后座轻轻唱，邓丽君的旋律飘过香港街头
    original: 第一次骑自行车.png

  - type: pair
    items:
      - src: 12-singing.jpg
        caption: 在春风里
        description: "你笑得甜蜜蜜，好像花儿开在春风里"
        original: 第一次骑自行车-唱歌.png
      - src: 13-beautiful.jpg
        caption: 一刻
        description: 那时他们都以为，这样的日子还会继续下去
        original: 美好.png

  - type: full
    src: 14-daily-life.jpg
    caption: 日常
    description: 一起吃馄饨，一起数零钱，平凡的相伴最是难得
    original: 日常相处.png

  - type: pair
    items:
      - src: 15-surprised.jpg
        caption: 失神
        description: 她看着他，一时有些失神，像是想起了什么很久以前的事
        original: 吃惊黎小军的单纯.png
      - src: 16-silly-smile.jpg
        caption: 老样子
        description: 他笑起来还是老样子，像这些年的奔波并没有真的改掉什么
        original: 傻笑.png

  - type: full
    src: 17-bracelet.jpg
    caption: 旧念
    description: 金镯子还没戴上，旧日的人和旧日的心事，已经先一步横在了他们中间
    original: 买金手镯-惊讶黎小军同时想着小婷.png

  - type: text
    content: 命运弄人，我们都没有选对时间

  # ═══ 第三幕：分离 ═══
  - type: full
    src: 18-comfort.jpg
    caption: 陪着
    description: 繁华一下子散了，他却还坐在她身边，没有走开
    original: 安慰李翘.png

  - type: full
    src: 19-paoge-dead.jpg
    caption: 诀别
    description: 那个一直护着她的人走了，只剩那道纹身还替他留在身上
    original: 爱李翘的豹哥去世了.png

  # ═══ 第四幕：重逢 ═══
  - type: text
    content: 一九九五年，香港街头

  - type: pair
    items:
      - src: 20-reunion1-mixed.jpg
        caption: 五味杂陈
        description: 多年后再见，往事涌上心头，不知从何说起
        original: 第一次重逢-五味杂陈.png
      - src: 21-reunion1-truth.jpg
        caption: 说破
        description: 兜转多年，那些藏了太久的话，终于还是说出了口
        original: 第一次重逢-直面真心.png

  - type: text
    content: 有些人重逢了，也还是来不及

  - type: full
    src: 22-reunion2-see.jpg
    caption: 一瞥
    description: 纽约街头，一个熟悉的背影骑车掠过去，她几乎立刻就认了出来
    original: 第二次重逢-看见黎小军的背影.png

  - type: pair
    items:
      - src: 23-reunion2-chase.jpg
        caption: 追上去
        description: 她穿过人群追过去，像是想把错过的那几年一起追回来
        original: 第二次重逢-追逐骑车的黎小军.png
      - src: 24-reunion2-miss.jpg
        caption: 又错过
        description: 一盏红灯拦在前面，她只能看着那道背影重新没进人海
        original: 第二次重逢-最终没有追上黎小军.png

  # ═══ 第五幕：最终的重逢 ═══
  - type: text
    content: 一九九五年五月八日，纽约

  - type: full
    src: 25-us-life.jpg
    caption: 漂泊
    description: 她在洗衣店打工，他在唐人街落脚，日子各自往前过着
    original: 在美国的普通生活.png

  - type: full
    src: 26-teresa-dead.jpg
    caption: 邓丽君
    description: 电视播报邓丽君去世的消息，他们同时驻足在商店橱窗前
    original: 最终的重逢-观看邓丽君去世的消息.png

  - type: pair
    items:
      - src: 27-final-recognize-him.jpg
        caption: 回身
        description: 她转过头，一眼就看见了那个熟悉的人
        original: 最终的重逢-认出了黎小军.png
      - src: 28-final-recognize-her.jpg
        caption: 是你
        description: 他也认出了她，岁月在脸上，情意未改
        original: 最终的重逢-黎小军认出了李翘.png

  - type: pair
    items:
      - src: 29-final-smile-her.jpg
        caption: 如旧
        description: 她终于笑了，眉眼一弯，还是当年的样子
        original: 最终的重逢-李翘开心的笑了.png
      - src: 30-final-smile-him.jpg
        caption: 在梦里
        description: "我一时想不起，啊，在梦里"
        original: 最终的重逢-黎开心的笑了.png

  - type: text
    content: 梦里遇见你，原来不是梦
