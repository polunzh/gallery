  - type: hero
    src: 01-first-meeting.jpg
    caption: 初识
    description: 蓝帘低垂，她站在那里，眼神还没有完全松下来
    original: 田曦薇-初识.png

  - type: text
    content: 喜怒哀乐，皆是真情

  - type: pair
    items:
      - src: 08-happy.jpg
