        original: 担心-焦急.png
      - src: 23-cute-scared.jpg
        caption: 后怕
        description: 她缩在木柱旁，神情还没有缓过来，惊意还停在肩头
        original: 可爱-后怕.png

  - type: full
    src: 24-light-worry.jpg
    caption: 笑语盈盈暗香去
    description: 光从一侧落下来，她抬眼望着，像在等什么，也像只是出神
